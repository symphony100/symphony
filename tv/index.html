<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Studio Player</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <!-- HLS.js (m3u8再生用) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    /* システム標準のスワイプを強制禁止 */
    html, body {
      font-family: 'Roboto', 'Noto Sans JP', sans-serif;
      background-color: #f0f4f9;
      overscroll-behavior: none !important;
      touch-action: pan-y;
    }
    .filled-icon {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      color: #0095d9 !important;
    }
    .favorite-star {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      color: #ffb300 !important;
    }
    video::-webkit-media-controls {
      display: none !important;
    }
    
    /* プレイヤー稼働時のボディロック */
    .player-active {
      overflow: hidden !important;
      height: 100vh !important;
      touch-action: none !important;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#0095d9',
              light: '#e6f4fc',
              dark: '#007cb5',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="text-gray-900 min-h-screen">

  <!-- ==============================================
       A. メイン一覧画面
       ============================================== -->
  <div id="main-view" class="block w-full min-h-screen flex flex-col">
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-200/50 sticky top-0 z-40 select-none">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <span class="material-symbols-outlined text-brand text-3xl">tv</span>
          <h1 class="text-xl font-normal tracking-tight text-gray-800">IPTV Player Studio</h1>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-8 space-y-8 pb-16 w-full">
      <!-- アップロードエリア -->
      <div id="drop-zone" class="border border-dashed border-gray-300 hover:border-brand bg-white hover:bg-brand-light/30 rounded-3xl p-8 text-center cursor-pointer transition-all duration-300 select-none">
        <input type="file" id="file-input" accept=".m3u,.m3u8" class="hidden">
        <span class="material-symbols-outlined text-4xl text-brand mb-2">cloud_upload</span>
        <p class="text-sm font-medium text-gray-700">最新のM3Uファイルをドラッグ＆ドロップ、または選択</p>
        <p class="text-xs text-gray-400 mt-1">※アップロードすると、全端末に全自動で同期・配信URLが更新されます</p>
      </div>

      <!-- A-1. お気に入りセクション -->
      <div id="favorite-section" class="hidden space-y-4">
        <h3 class="text-lg font-medium text-gray-800 px-2 flex items-center space-x-2">
          <span class="material-symbols-outlined text-amber-500 favorite-star">star</span>
          <span>お気に入り</span>
        </h3>
        <div id="favorite-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      </div>

      <!-- A-2. 東京のテレビ -->
      <div class="space-y-4">
        <h3 class="text-lg font-medium text-gray-800 px-2 flex items-center space-x-2">
          <span class="material-symbols-outlined text-brand">map</span>
          <span>東京のテレビ</span>
        </h3>
        <div id="tokyo-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      </div>

      <!-- A-3. 大阪のテレビ -->
      <div class="space-y-4">
        <h3 class="text-lg font-medium text-gray-800 px-2 flex items-center space-x-2">
          <span class="material-symbols-outlined text-brand">location_on</span>
          <span>大阪のテレビ</span>
        </h3>
        <div id="osaka-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      </div>
    </main>
  </div>

  <!-- ==============================================
       B. 専用プレイヤー画面
       ============================================== -->
  <div id="player-view" class="hidden fixed inset-0 bg-black flex flex-col overflow-hidden z-50 select-none">
    
    <!-- 上部メニューバー (カーソル連動、左側ホバー時は常時固定) -->
    <header id="player-header" class="absolute top-0 inset-x-0 h-14 bg-[#141414]/90 backdrop-blur-md text-white px-6 flex items-center border-b border-zinc-900/80 shrink-0 z-50 opacity-0 pointer-events-none transition-opacity duration-300">
      <button id="back-btn" class="flex items-center space-x-2 text-gray-400 hover:text-white mr-4 transition-all duration-200 group/btn">
        <span class="material-symbols-outlined transition-transform duration-200 group-hover/btn:-translate-x-1">arrow_back</span>
        <span class="text-sm font-medium">戻る</span>
      </button>
      <div class="h-5 w-[1px] bg-zinc-700 mr-4"></div>
      <h2 id="playing-channel-name" class="text-sm font-medium truncate text-gray-300">チャンネル名</h2>
    </header>
    
    <!-- プレイヤー本体 -->
    <div class="flex-1 bg-black flex items-center justify-center min-h-0 overflow-hidden select-none relative">
      <div id="video-wrapper" class="relative w-full h-full flex items-center justify-center max-w-full max-h-full">
        
        <!-- ビデオ本体 -->
        <video id="video-player" class="max-w-full max-h-full object-contain rounded-2xl bg-black" autoplay playsinline></video>
        
        <!-- ロード中 -->
        <div id="player-loader" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center space-y-3 opacity-0 pointer-events-none transition-opacity duration-300">
          <div class="w-10 h-10 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
          <p id="loader-text" class="text-sm text-gray-300">ストリームをロード中...</p>
        </div>

        <!-- 再生不可時の赤文字エラー表示 -->
        <div id="player-error" class="hidden absolute inset-0 bg-[#0f0f0f]/95 flex flex-col items-center justify-center p-6 text-center z-30 transition-opacity duration-300 rounded-2xl">
          <span class="material-symbols-outlined text-red-500 text-6xl mb-3 font-light animate-pulse">error</span>
          <h3 class="text-red-500 text-lg font-bold tracking-wide">このチャンネルは現在視聴できません</h3>
          <p class="text-gray-400 text-xs mt-2 max-w-sm">ストリーム配信元がオフラインか、一時的にアドレスが無効、またはCORS保護エラーです。</p>
        </div>

        <!-- ==============================================
             十字キー型「スマートリモコンUI」
             ============================================== -->
        <div id="remote-overlay" class="absolute inset-0 flex items-center justify-center bg-black/45 opacity-0 pointer-events-none transition-opacity duration-300 z-40">
          <!-- リモコンのコンテナ -->
          <div id="remote-container" class="relative w-56 h-56 flex items-center justify-center select-none pointer-events-auto">
            <!-- 背景サークル -->
            <div class="absolute inset-0 bg-[#1a1a1a]/95 backdrop-blur-md rounded-full shadow-2xl border border-zinc-800"></div>
            
            <!-- 上：プレーヤー更新 -->
            <button onclick="triggerAutoReload()" class="absolute top-2.5 w-16 h-12 flex flex-col items-center justify-center text-gray-300 hover:text-brand focus:outline-none transition-colors group/btn">
              <span class="material-symbols-outlined text-2xl group-hover/btn:scale-115 transition-transform">refresh</span>
              <span class="text-[9px] text-gray-400 mt-0.5 tracking-wider">更新</span>
            </button>
            
            <!-- 左：前のチャンネル -->
            <button onclick="playPrevChannel()" class="absolute left-2.5 w-16 h-12 flex flex-col items-center justify-center text-gray-300 hover:text-brand focus:outline-none transition-colors group/btn">
              <span class="material-symbols-outlined text-2xl group-hover/btn:scale-115 transition-transform">skip_previous</span>
              <span class="text-[9px] text-gray-400 mt-0.5 tracking-wider">前へ</span>
            </button>
            
            <!-- 中央：一時停止・再生 -->
            <button id="remote-play-btn" onclick="togglePlay()" class="absolute w-14 h-14 bg-brand text-white rounded-full flex items-center justify-center shadow-lg hover:bg-brand-dark focus:outline-none transition-all scale-100 active:scale-95">
              <span id="remote-play-icon" class="material-symbols-outlined text-2xl">pause</span>
            </button>
            
            <!-- 右：後のチャンネル -->
            <button onclick="playNextChannel()" class="absolute right-2.5 w-16 h-12 flex flex-col items-center justify-center text-gray-300 hover:text-brand focus:outline-none transition-colors group/btn">
              <span class="material-symbols-outlined text-2xl group-hover/btn:scale-115 transition-transform">skip_next</span>
              <span class="text-[9px] text-gray-400 mt-0.5 tracking-wider">次へ</span>
            </button>
            
            <!-- 下：1クリックでプレイヤーを閉じる（ホームへ戻る） -->
            <button id="remote-bottom-btn" class="absolute bottom-2.5 w-16 h-12 flex flex-col items-center justify-center text-gray-300 hover:text-red-500 focus:outline-none transition-colors group/btn">
              <span class="material-symbols-outlined text-2xl group-hover/btn:scale-115 transition-transform">close</span>
              <span class="text-[9px] text-gray-400 mt-0.5 tracking-wider">閉じる</span>
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-lg text-sm transition-all duration-300 opacity-0 pointer-events-none z-[100] flex items-center space-x-2 border border-zinc-700">
    <span class="material-symbols-outlined text-brand animate-spin text-lg" id="toast-icon">sync</span>
    <span id="toast-message">同期中...</span>
  </div>

  <!-- ==============================================
       JS ロジック
       ============================================== -->
  <script>

    const rawM3U = `

#EXTINF:-1 group-title="Osaka" tvg-id="tv_osaka" tvg-name="テレビ大阪" tvg-logo="http://cohzi1516.s322.xrea.com/logo/digi/TVO.png", CH-07 テレビ大阪
http://58.82.168.138:5002/gx05.m3u8?token=guoziyun&gid=gx05&channel=zhongying

http://58.82.168.138:5002/gx07.m3u8?token=guoziyun&gid=gx07&channel=zhongying
#EXTINF:-1 group-title="Osaka" tvg-id="KBS" tvg-name="KBS京都" tvg-logo="http://cohzi1516.s322.xrea.com/logo/digi/kbskyoto.png", CH-03 KBS京都

    const STORAGE_KEY = 'iptv_player_data_v12';
    let presetChannels = [];
    const cloudRoom = 'iptv_studio_shared_storage_room_2026';
    const syncCode = 'COMMON_IPTV_ROOM_SHARED_2026';

    // UI要素
    const mainView = document.getElementById('main-view');
    const playerView = document.getElementById('player-view');
    const backBtn = document.getElementById('back-btn');
    const playingChannelName = document.getElementById('playing-channel-name');
    const videoPlayer = document.getElementById('video-player');
    const videoWrapper = document.getElementById('video-wrapper');
    const playerLoader = document.getElementById('player-loader');
    const playerError = document.getElementById('player-error');
    const loaderText = document.getElementById('loader-text');
    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toast-icon');
    const toastMessage = document.getElementById('toast-message');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    // メニューバー
    const playerHeader = document.getElementById('player-header');

    // グリッド
    const favoriteSection = document.getElementById('favorite-section');
    const favoriteGrid = document.getElementById('favorite-grid');
    const tokyoGrid = document.getElementById('tokyo-grid');
    const osakaGrid = document.getElementById('osaka-grid');

    // 十字リモコン
    const remoteOverlay = document.getElementById('remote-overlay');
    const remoteContainer = document.getElementById('remote-container');
    const remotePlayIcon = document.getElementById('remote-play-icon');
    const remoteBottomBtn = document.getElementById('remote-bottom-btn');

    // 監視・再生制御
    let checkInterval = null;
    let lastTime = -1;
    let freezeDuration = 0;
    let currentPlayingUrl = "";
    let currentPlayingName = "";
    let controlTimeout = null;
    let reloadAttempts = 0;
    let lastSyncedTimestamp = 0;
    let activeChannelsList = []; 

    // タッチスライド
    let touchStartX = 0;
    let touchStartY = 0;
    let touchEndX = 0;
    let touchEndY = 0;

    // テレビの描画（映ったか）検知フラグ
    let isStreamReady = false;

    // トースト
    function showToast(message, isError = false) {
      toastMessage.textContent = message;
      if (isError) {
        toastIcon.textContent = 'error';
        toastIcon.className = 'material-symbols-outlined text-red-500 text-lg';
      } else {
        toastIcon.textContent = 'sync';
        toastIcon.className = 'material-symbols-outlined text-brand animate-spin text-lg';
      }
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 4000);
    }

    // ★ GitHub等のドメインブロック（CORSや参照制限）を強力にバイパスする判定ロジック
    function needsBypass(url) {
      if (!url) return false;
      return url.includes('github') || 
             url.includes('netgenx.site') || 
             url.includes('charandom.blog');
    }

    function bypassUrl(url) {
      if (!url) return "";
      if (url.includes('corsproxy.io')) return url;
      if (needsBypass(url)) {
        // プロキシ経由に書き換え
        return `https://corsproxy.io/?${encodeURIComponent(url)}`;
      }
      return url;
    }

    // M3Uパース
    function parseM3U(text) {
      const lines = text.split('\n');
      const channels = [];
      let currentInfo = null;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        if (line.startsWith('#EXTINF:')) {
          currentInfo = parseExtInf(line);
        } else if (line.startsWith('http://') || line.startsWith('https://')) {
          if (currentInfo) {
            currentInfo.url = line;
            channels.push(currentInfo);
            currentInfo = null;
          }
        }
      }
      return channels;
    }

    function parseExtInf(line) {
      const tvgIdMatch = line.match(/tvg-id="([^"]+)"/i);
      const tvgNameMatch = line.match(/tvg-name="([^"]+)"/i);
      const groupMatch = line.match(/group-title="([^"]+)"/i);
      const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
      
      const commaIndex = line.lastIndexOf(',');
      const displayName = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : "";

      let rawGroup = groupMatch ? groupMatch[1].toLowerCase() : "etc";
      let matchedGroup = "etc";
      if (rawGroup.includes("tokyo")) matchedGroup = "tokyo";
      else if (rawGroup.includes("osaka")) matchedGroup = "osaka";

      const name = tvgNameMatch ? tvgNameMatch[1] : displayName;
      const keywords = [name.toLowerCase(), displayName.toLowerCase()];
      if (tvgIdMatch) keywords.push(tvgIdMatch[1].toLowerCase());

      return {
        id: tvgIdMatch ? tvgIdMatch[1] : Math.random().toString(36).substr(2, 9),
        name: name,
        logo: logoMatch ? logoMatch[1] : "",
        group: matchedGroup,
        keywords: keywords,
        currentUrl: "",
        favorite: false
      };
    }

    // 初期化
    function initializeData() {
      const parsedDefault = parseM3U(rawM3U);
      parsedDefault.forEach(ch => {
        ch.currentUrl = ch.url;
      });
      presetChannels = parsedDefault.filter(ch => ch.group === 'tokyo' || ch.group === 'osaka');

      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const savedData = JSON.parse(saved);
        savedData.forEach(item => {
          const ch = presetChannels.find(p => p.id === item.id || p.name === item.name);
          if (ch) {
            if (item.currentUrl) ch.currentUrl = item.currentUrl;
            ch.favorite = !!item.favorite;
          }
        });
      }
      saveState();
    }

    function saveState() {
      const data = presetChannels.map(ch => ({
        id: ch.id,
        name: ch.name,
        currentUrl: ch.currentUrl,
        favorite: ch.favorite
      }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      
      // 同期処理例外での全体クラッシュ防止用カプセル化
      setTimeout(() => {
        saveToCloud().catch(err => console.warn("Cloud sync ignored:", err));
      }, 0);
    }

    // レンダリング
    function renderLibrary() {
      tokyoGrid.innerHTML = '';
      osakaGrid.innerHTML = '';
      favoriteGrid.innerHTML = '';

      let favoriteChannels = presetChannels.filter(ch => ch.favorite);
      let tokyoChannels = presetChannels.filter(ch => ch.group === 'tokyo');
      let osakaChannels = presetChannels.filter(ch => ch.group === 'osaka');

      if (favoriteChannels.length > 0) {
        favoriteSection.classList.remove('hidden');
        favoriteChannels.forEach(ch => renderCard(ch, favoriteGrid));
      } else {
        favoriteSection.classList.add('hidden');
      }

      tokyoChannels.sort((a,b) => a.name.localeCompare(b.name, 'ja')).forEach(ch => renderCard(ch, tokyoGrid));
      osakaChannels.sort((a,b) => a.name.localeCompare(b.name, 'ja')).forEach(ch => renderCard(ch, osakaGrid));
      
      updateActiveChannelsList();
    }

    // ホバー枠色変更のみのクリーンカード
    function renderCard(ch, parentGrid) {
      const hasUrl = !!ch.currentUrl;
      const starClass = ch.favorite ? 'filled-icon' : 'text-gray-400 hover:text-brand';
      
      const finalLogoUrl = ch.logo ? bypassUrl(ch.logo) : "";
      
      const logoHTML = finalLogoUrl 
        ? `<img src="${finalLogoUrl}" alt="${ch.name}" class="w-12 h-12 object-contain bg-gray-50 rounded-2xl p-1 border border-gray-200/60 shadow-sm" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
        : '';
      const fallbackLogoHTML = `<div class="w-12 h-12 flex items-center justify-center bg-brand-light rounded-2xl text-brand" style="${ch.logo ? 'display:none;' : ''}">
                                  <span class="material-symbols-outlined text-2xl font-light">live_tv</span>
                                </div>`;

      const card = document.createElement('div');
      card.className = `relative bg-white rounded-3xl p-5 border-2 border-gray-200/40 shadow-sm hover:shadow-md hover:border-brand transition-all duration-300 ${hasUrl ? 'cursor-pointer' : 'opacity-60 cursor-not-allowed'}`;
      
      card.innerHTML = `
        <button class="absolute top-4 right-4 z-10 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors" onclick="toggleFavorite('${ch.id}', event)">
          <span class="material-symbols-outlined text-xl ${starClass}">star</span>
        </button>

        <div class="flex items-center space-x-4 pr-8">
          ${logoHTML}
          ${fallbackLogoHTML}
          <div class="overflow-hidden">
            <h4 class="font-medium text-gray-800 text-sm truncate">${ch.name}</h4>
            <p class="text-xs text-gray-400 mt-0.5">${hasUrl ? 'タップして再生' : 'オフライン'}</p>
          </div>
        </div>
      `;

      if (hasUrl) {
        card.addEventListener('click', () => {
          switchToPlayerView(ch.name);
          playStream(ch.currentUrl, ch.name);
        });
      }

      parentGrid.appendChild(card);
    }

    window.toggleFavorite = function(id, event) {
      event.stopPropagation();
      const channel = presetChannels.find(ch => ch.id === id);
      if (channel) {
        channel.favorite = !channel.favorite;
        saveState();
        renderLibrary();
      }
    }

    // ==============================================
    // クラウド全自動同期 (CORSプロキシ付加)
    // ==============================================
    async function saveToCloud() {
      const timestamp = Date.now();
      lastSyncedTimestamp = timestamp;

      const payload = {
        timestamp: timestamp,
        channels: presetChannels.map(ch => ({
          id: ch.id,
          name: ch.name,
          currentUrl: ch.currentUrl,
          favorite: ch.favorite
        }))
      };
      
      try {
        const targetUrl = `https://kvs.ix.workers.dev/${cloudRoom}/iptv_sync_data`;
        const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
        
        await fetch(proxiedUrl, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.warn("クラウド保存に失敗:", err);
      }
    }

    async function silentSyncFromCloud() {
      try {
        const targetUrl = `https://kvs.ix.workers.dev/${cloudRoom}/iptv_sync_data`;
        const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

        const response = await fetch(proxiedUrl);
        if (response.ok) {
          const cloudData = await response.json();
          
          if (cloudData.timestamp && cloudData.timestamp > lastSyncedTimestamp) {
            lastSyncedTimestamp = cloudData.timestamp;
            
            cloudData.channels.forEach(item => {
              const ch = presetChannels.find(p => p.id === item.id || p.name === item.name);
              if (ch) {
                if (item.currentUrl) ch.currentUrl = item.currentUrl;
                ch.favorite = !!item.favorite;
              }
            });

            const dataToSave = presetChannels.map(ch => ({
              id: ch.id,
              name: ch.name,
              currentUrl: ch.currentUrl,
              favorite: ch.favorite
            }));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));

            renderLibrary();
            showToast("全自動で最新のアドレスに同期しました。");
          }
        }
      } catch (err) {
        console.warn("自動同期エラー:", err);
      }
    }

    setInterval(() => {
      if (!mainView.classList.contains('hidden')) {
        silentSyncFromCloud();
      }
    }, 15000);

    // ==============================================
    // 画面切り替えとフィット制御
    // ==============================================
    function switchToPlayerView(channelName) {
      window.scrollTo(0, 0); 
      playingChannelName.textContent = channelName;
      
      // 最初はリモコンやヘッダーを100%隠しておく
      isStreamReady = false; 
      hideRemoteImmediate();

      mainView.classList.add('hidden');
      playerView.classList.remove('hidden');
      
      document.body.classList.add('player-active');
    }

    function switchToMainView() {
      stopStream();
      
      toast.classList.remove('opacity-100');
      toast.classList.add('opacity-0', 'pointer-events-none');

      playerView.classList.add('hidden');
      mainView.classList.remove('hidden');

      document.body.classList.remove('player-active');
    }

    backBtn.addEventListener('click', switchToMainView);

    // スワイプ戻り防止
    playerView.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchEndX = 0;
      touchEndY = 0;
    }, { passive: true });

    playerView.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) return; 
      touchEndX = e.touches[0].clientX;
      touchEndY = e.touches[0].clientY;

      const diffX = touchEndX - touchStartX;
      if (touchStartX < 50 && diffX > 10) {
        if (e.cancelable) e.preventDefault(); 
      }
    }, { passive: false });

    playerView.addEventListener('touchend', (e) => {
      if (touchStartX > 0 && touchEndX > 0) {
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (diffX > 100 && Math.abs(diffY) < 80) {
          switchToMainView();
        }
      }
      touchStartX = 0;
      touchEndX = 0;
    });

    // ==============================================
    // 前・後のテレビ切り替えシステム
    // ==============================================
    function updateActiveChannelsList() {
      activeChannelsList = presetChannels.filter(ch => !!ch.currentUrl);
    }

    window.playPrevChannel = function() {
      updateActiveChannelsList();
      if (activeChannelsList.length === 0) return;
      
      let currentIndex = activeChannelsList.findIndex(ch => ch.currentUrl === currentPlayingUrl);
      if (currentIndex === -1) currentIndex = 0;
      
      let prevIndex = (currentIndex - 1 + activeChannelsList.length) % activeChannelsList.length;
      const prevChannel = activeChannelsList[prevIndex];
      
      playingChannelName.textContent = prevChannel.name;
      playStream(prevChannel.currentUrl, prevChannel.name);
    }

    window.playNextChannel = function() {
      updateActiveChannelsList();
      if (activeChannelsList.length === 0) return;
      
      let currentIndex = activeChannelsList.findIndex(ch => ch.currentUrl === currentPlayingUrl);
      if (currentIndex === -1) currentIndex = 0;
      
      let nextIndex = (currentIndex + 1) % activeChannelsList.length;
      const nextChannel = activeChannelsList[nextIndex];
      
      playingChannelName.textContent = nextChannel.name;
      playStream(nextChannel.currentUrl, nextChannel.name);
    }

    // ==============================================
    // リモコン ＆ メニューバー 連動・ホバー固定
    // ==============================================
    function showRemote() {
      // ★ テレビが映るまではリモコンやヘッダーを表示しない
      if (!isStreamReady) return;

      remoteOverlay.classList.remove('opacity-0', 'pointer-events-none');
      playerHeader.classList.remove('opacity-0', 'pointer-events-none');

      clearTimeout(controlTimeout);
      controlTimeout = setTimeout(() => {
        remoteOverlay.classList.add('opacity-0', 'pointer-events-none');
        playerHeader.classList.add('opacity-0', 'pointer-events-none');
      }, 4000); 
    }

    function hideRemoteImmediate() {
      remoteOverlay.classList.add('opacity-0', 'pointer-events-none');
      playerHeader.classList.add('opacity-0', 'pointer-events-none');
    }

    // ★ リモコンやヘッダーの上にカーソルがあるときは、消えないようにロックする
    remoteContainer.addEventListener('mouseenter', () => {
      if (!isStreamReady) return;
      clearTimeout(controlTimeout);
    });
    remoteContainer.addEventListener('mouseleave', () => {
      if (!isStreamReady) return;
      showRemote();
    });

    playerHeader.addEventListener('mouseenter', () => {
      if (!isStreamReady) return;
      clearTimeout(controlTimeout);
    });
    playerHeader.addEventListener('mouseleave', () => {
      if (!isStreamReady) return;
      showRemote();
    });

    videoWrapper.addEventListener('mousemove', (e) => {
      if (!isStreamReady) return;
      showRemote();

      // ★ マウスが画面の左側（200px以内）にあるときは、戻るボタンがあるヘッダーを常時固定表示
      if (e.clientX < 200) {
        clearTimeout(controlTimeout);
      }
    });

    videoWrapper.addEventListener('touchstart', showRemote, { passive: true });
    
    videoWrapper.addEventListener('click', (e) => {
      if (e.target.closest('#remote-container')) return;
      showRemote();
    });

    window.togglePlay = function() {
      if (videoPlayer.paused) {
        videoPlayer.play();
      } else {
        videoPlayer.pause();
      }
    }

    videoPlayer.addEventListener('play', () => {
      remotePlayIcon.textContent = "pause";
    });

    videoPlayer.addEventListener('pause', () => {
      remotePlayIcon.textContent = "play_arrow";
    });

    // ★ リモコン下ボタン：1回のクリックで即座にプレイヤーを完全に閉じてホームに戻る
    remoteBottomBtn.addEventListener('click', (e) => {
      e.stopPropagation(); 
      switchToMainView();
    });

    // ==============================================
    // HLS再生 ＆ エラー・5秒フリーズ検知
    // ==============================================
    function playStream(url, name) {
      // プレイリストの読み込み時にもCORSバイパスを通す
      const finalPlayUrl = bypassUrl(url);
      
      currentPlayingUrl = url;
      currentPlayingName = name;

      // 新ストリーム開始時はリモコン制御をリセット
      isStreamReady = false;
      hideRemoteImmediate();

      playerError.classList.add('hidden');
      playerLoader.classList.remove('opacity-0', 'pointer-events-none');
      loaderText.textContent = "ストリームをロード中...";

      remotePlayIcon.textContent = "pause";

      if (Hls.isSupported()) {
        if (window.hlsInstance) {
          window.hlsInstance.destroy();
        }

        const hls = new Hls({
          manifestLoadingMaxRetry: 1,
          levelLoadingMaxRetry: 1,
          enableWorker: true,
          
          // ★ 意地でもブロックを通す：TSなどの動画の破片リクエスト（セグメント）に対しても、CORSプロキシを全自動付加して読み込ませます
          xhrSetup: function (xhr, targetSegUrl) {
            if (needsBypass(targetSegUrl) && !targetSegUrl.includes('corsproxy.io')) {
              const proxied = `https://corsproxy.io/?${encodeURIComponent(targetSegUrl)}`;
              xhr.open('GET', proxied, true);
            }
          }
        });
        window.hlsInstance = hls;
        hls.loadSource(finalPlayUrl);
        hls.attachMedia(videoPlayer);

        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          videoPlayer.play().catch(err => {
            console.warn("自動再生制限");
          });
        });

        hls.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal) {
            console.error("HLSエラー:", data.type);
            triggerAutoReload();
          }
        });

      } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
        videoPlayer.src = finalPlayUrl;
        videoPlayer.addEventListener('loadedmetadata', function() {
          videoPlayer.play();
        });
      } else {
        showPlayerError();
        return;
      }

      startFreezeCheck();
    }

    function stopStream() {
      stopFreezeCheck();
      videoPlayer.pause();
      videoPlayer.src = "";
      if (window.hlsInstance) {
        window.hlsInstance.destroy();
        window.hlsInstance = null;
      }
      playerLoader.classList.add('opacity-0', 'pointer-events-none');
      playerError.classList.add('hidden');
      reloadAttempts = 0;
      isStreamReady = false;
    }

    function startFreezeCheck() {
      stopFreezeCheck();
      lastTime = -1;
      freezeDuration = 0;

      checkInterval = setInterval(() => {
        if (videoPlayer.paused) {
          freezeDuration = 0;
          return;
        }

        const currentTime = videoPlayer.currentTime;
        if (currentTime === lastTime) {
          freezeDuration++;
          
          if (freezeDuration >= 5) {
            triggerAutoReload();
          }
        } else {
          freezeDuration = 0;
          lastTime = currentTime;
        }
      }, 1000);
    }

    function stopFreezeCheck() {
      if (checkInterval) {
        clearInterval(checkInterval);
        checkInterval = null;
      }
    }

    window.triggerAutoReload = function() {
      stopFreezeCheck();
      reloadAttempts++;

      if (reloadAttempts >= 3) {
        showPlayerError();
        return;
      }

      showToast("接続が切れたため自動再接続しています...");
      loaderText.textContent = "再接続中...";
      playerLoader.classList.remove('opacity-0', 'pointer-events-none');

      setTimeout(() => {
        playStream(currentPlayingUrl, currentPlayingName);
      }, 1500);
    }

    function showPlayerError() {
      stopFreezeCheck();
      playerLoader.classList.add('opacity-0', 'pointer-events-none');
      playerError.classList.remove('hidden');
      videoPlayer.pause();
    }

    videoPlayer.addEventListener('error', (e) => {
      console.error("再生不可エラー", e);
      showPlayerError();
    });

    videoPlayer.addEventListener('waiting', () => {
      loaderText.textContent = "バッファリング中...";
      playerLoader.classList.remove('opacity-0', 'pointer-events-none');
    });

    // ★ テレビが映った(playing)タイミングでロード画面を隠し、リモコンを解禁します
    videoPlayer.addEventListener('playing', () => {
      playerLoader.classList.add('opacity-0', 'pointer-events-none');
      freezeDuration = 0;
      
      isStreamReady = true; 
    });

    // ==============================================
    // アップロード
    // ==============================================
    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const parsed = parseM3U(text);
          
          let updatedCount = 0;
          parsed.forEach(uploaded => {
            const ch = presetChannels.find(p => p.id === uploaded.id || p.keywords.some(k => uploaded.keywords.includes(k)));
            if (ch) {
              ch.currentUrl = uploaded.url;
              updatedCount++;
            }
          });

          saveState();
          renderLibrary();
          showToast(`${updatedCount}個のアドレスを更新・全自動同期しました。`);
        } catch (err) {
          console.error("M3U読込エラー:", err);
          showToast("ファイルの解析に失敗しました。", true);
        }
      };
      reader.readAsText(file);
    }

    dropZone.addEventListener('click', (e) => {
      if (e.target !== fileInput) {
        fileInput.click();
      }
    });
    
    fileInput.addEventListener('change', (e) => {
      if (e.target.files && e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('bg-brand-light/50', 'border-brand');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('bg-brand-light/50', 'border-brand');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('bg-brand-light/50', 'border-brand');
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    // 起動
    initializeData();
    renderLibrary();
  </script>
</body>
