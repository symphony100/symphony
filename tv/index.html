<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Studio Player</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <!-- HLS.js (m3u8再生用) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      font-family: 'Roboto', 'Noto Sans JP', sans-serif;
      background-color: #f0f4f9;
    }
    .filled-icon {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      color: #0095d9 !important;
    }
    .favorite-star {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      color: #ffb300 !important;
    }
    video::-webkit-media-controls {
      display: none !important;
    }
    
    /* プレイヤーが画面内にハミ出さず完全にフィットするための16:9設定 */
    #video-wrapper {
      aspect-ratio: 16 / 9;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#0095d9',
              light: '#e6f4fc',
              dark: '#007cb5',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="text-gray-900 min-h-screen">

  <!-- ==============================================
       画面遷移用スライダーコンテナ (右・左スライドアニメーション)
       ============================================== -->

    <div id="view-slider" class="flex w-[200%] min-h-screen transition-transform duration-300 ease-out transform translate-x-0">
      
      <!-- ==============================================
           A. メイン一覧画面 (1/2幅) 
           ============================================== -->
      <div class="w-1/2 min-h-screen flex flex-col shrink-0">
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200/50 sticky top-0 z-40">
          <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
              <span class="material-symbols-outlined text-brand text-3xl">tv</span>
              <h1 class="text-xl font-normal tracking-tight text-gray-800">IPTV Player Studio</h1>
            </div>
          </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 mt-8 space-y-8 pb-16 w-full">
          <!-- アップロードエリア -->
          <div id="drop-zone" class="border border-dashed border-gray-300 hover:border-brand bg-white hover:bg-brand-light/30 rounded-3xl p-8 text-center cursor-pointer transition-all duration-300">
            <input type="file" id="file-input" accept=".m3u,.m3u8" class="hidden">
            <span class="material-symbols-outlined text-4xl text-brand mb-2">cloud_upload</span>
            <p class="text-sm font-medium text-gray-700">最新のM3Uファイルをドラッグ＆ドロップ、または選択</p>
            <p class="text-xs text-gray-400 mt-1">※アップロードした瞬間に全デバイスが全自動で同期されます</p>
          </div>

          <!-- A-1. お気に入りセクション -->
          <div id="favorite-section" class="hidden space-y-4">
            <h3 class="text-lg font-medium text-gray-800 px-2 flex items-center space-x-2">
              <span class="material-symbols-outlined text-amber-500 favorite-star">star</span>
              <span>お気に入り</span>
            </h3>
            <div id="favorite-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
          </div>

          <!-- A-2. 東京のテレビ -->
          <div class="space-y-4">
            <h3 class="text-lg font-medium text-gray-800 px-2 flex items-center space-x-2">
              <span class="material-symbols-outlined text-brand">map</span>
              <span>東京のテレビ</span>
            </h3>
            <div id="tokyo-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
          </div>

          <!-- A-3. 大阪のテレビ -->
          <div class="space-y-4">
            <h3 class="text-lg font-medium text-gray-800 px-2 flex items-center space-x-2">
              <span class="material-symbols-outlined text-brand">location_on</span>
              <span>大阪のテレビ</span>
            </h3>
            <div id="osaka-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
          </div>
        </main>
      </div>

      <!-- ==============================================
           B. 専用プレイヤー画面 (1/2幅) - スクロール禁止フィット構造
           ============================================== -->
      <div id="player-view" class="w-1/2 h-screen bg-black flex flex-col overflow-hidden relative shrink-0">
        <!-- プレイヤーヘッダー (h-14固定) -->
        <header class="h-14 bg-[#141414] text-white px-6 flex items-center border-b border-zinc-900 shrink-0 select-none">
          <button id="back-btn" class="flex items-center space-x-2 text-gray-300 hover:text-white mr-4 transition-all duration-200 group/btn">
            <span class="material-symbols-outlined transition-transform duration-200 group-hover/btn:-translate-x-1">arrow_back</span>
            <span class="text-sm font-medium">戻る</span>
          </button>
          <div class="h-5 w-[1px] bg-zinc-700 mr-4"></div>
          <h2 id="playing-channel-name" class="text-sm font-medium truncate">チャンネル名</h2>
        </header>
        
        <!-- プレイヤー本体 (縦ハミ出しスクロールを100%阻止) -->
        <div class="flex-1 bg-black flex items-center justify-center p-4 md:p-8 min-h-0 overflow-hidden select-none relative">
          <!-- ビデオの16:9アスペクト比を維持し中央に最大配置するラッパー -->
          <div id="video-wrapper" class="relative w-full h-full flex items-center justify-center max-w-full max-h-full">
            
            <!-- ビデオ本体 -->
            <video id="video-player" class="max-w-full max-h-full object-contain rounded-2xl bg-black shadow-2xl" autoplay playsinline></video>
            
            <!-- ロード中 -->
            <div id="player-loader" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center space-y-3 opacity-0 pointer-events-none transition-opacity duration-300 rounded-2xl">
              <div class="w-10 h-10 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
              <p id="loader-text" class="text-sm text-gray-300">ストリームをロード中...</p>
            </div>

            <!-- 再生不可時の赤文字エラー表示 -->
            <div id="player-error" class="hidden absolute inset-0 bg-[#0f0f0f]/95 flex flex-col items-center justify-center p-6 text-center z-30 transition-opacity duration-300 rounded-2xl">
              <span class="material-symbols-outlined text-red-500 text-6xl mb-3 font-light animate-pulse">error</span>
              <h3 class="text-red-500 text-lg font-bold tracking-wide">このチャンネルは現在視聴できません</h3>
              <p class="text-gray-400 text-xs mt-2 max-w-sm">ストリーム配信元が完全にオフラインか、一時的にアドレスが無効です。</p>
            </div>

            <!-- カスタムコントロール -->
            <div id="custom-controls" class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/95 via-black/40 to-transparent p-6 flex flex-col space-y-4 opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity duration-300 rounded-b-2xl">
              
              <div class="w-full flex items-center justify-between">
                <input id="seek-bar" type="range" min="0" max="100" value="0" class="w-full h-1 bg-zinc-700 rounded-lg appearance-none cursor-pointer accent-brand" style="display: none;">
                <div id="live-badge" class="flex items-center space-x-1.5 bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded-md tracking-wider">
                  <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                  <span>LIVE</span>
                </div>
              </div>

              <div class="flex items-center justify-between" id="control-buttons">
                <div class="flex items-center space-x-4">
                  <button id="play-pause-btn" class="text-white hover:text-brand transition-colors flex items-center">
                    <span id="play-icon" class="material-symbols-outlined text-2xl">pause</span>
                  </button>
                  <button id="mute-btn" class="text-white hover:text-brand transition-colors flex items-center">
                    <span id="volume-icon" class="material-symbols-outlined text-2xl">volume_up</span>
                  </button>
                </div>

                <button id="fs-toggle" class="text-white hover:text-brand transition-colors flex items-center">
                  <span class="material-symbols-outlined text-2xl">fullscreen</span>
                </button>
              </div>

            </div>

          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-lg text-sm transition-all duration-300 opacity-0 pointer-events-none z-[100] flex items-center space-x-2 border border-zinc-700">
    <span class="material-symbols-outlined text-brand animate-spin text-lg" id="toast-icon">sync</span>
    <span id="toast-message">同期中...</span>
  </div>

  <!-- ==============================================
       JS ロジック
       ============================================== -->
  <script>

http://58.82.168.138:5002/gx04.m3u8?token=guoziyun&gid=gx04&channel=zhongying
#EXTINF:-1 group-title="Osaka" tvg-id="tv_osaka" tvg-name="テレビ大阪" tvg-logo="http://cohzi1516.s322.xrea.com/logo/digi/TVO.png", CH-07 テレビ大阪
http://58.82.168.138:5002/gx05.m3u8?token=guoziyun&gid=gx05&channel=zhongying

http://58.82.168.138:5002/gx07.m3u8?token=guoziyun&gid=gx07&channel=zhongying
#EXTINF:-1 group-title="Osaka" tvg-id="KBS" tvg-name="KBS京都" tvg-logo="http://cohzi1516.s322.xrea.com/logo/digi/kbskyoto.png", CH-03 KBS京都

    const STORAGE_KEY = 'iptv_player_data_v9';
    let presetChannels = [];
    
    // ★ グローバル同期用の共通キー
    const cloudRoom = 'iptv_studio_shared_storage_room_v2026';

    // ★ 現在最も安定している無料CORSプロキシ
    const CORS_PROXY = "https://corsproxy.io/?";

    // UI要素
    const mainView = document.getElementById('main-view');
    const playerView = document.getElementById('player-view');
    const viewSlider = document.getElementById('view-slider');
    const backBtn = document.getElementById('back-btn');
    const playingChannelName = document.getElementById('playing-channel-name');
    const videoPlayer = document.getElementById('video-player');
    const videoWrapper = document.getElementById('video-wrapper');
    const playerLoader = document.getElementById('player-loader');
    const playerError = document.getElementById('player-error');
    const loaderText = document.getElementById('loader-text');
    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toast-icon');
    const toastMessage = document.getElementById('toast-message');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    // グリッド
    const favoriteSection = document.getElementById('favorite-section');
    const favoriteGrid = document.getElementById('favorite-grid');
    const tokyoGrid = document.getElementById('tokyo-grid');
    const osakaGrid = document.getElementById('osaka-grid');

    // コントロール
    const customControls = document.getElementById('custom-controls');
    const seekBar = document.getElementById('seek-bar');
    const liveBadge = document.getElementById('live-badge');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const playIcon = document.getElementById('play-icon');
    const muteBtn = document.getElementById('mute-btn');
    const volumeIcon = document.getElementById('volume-icon');
    const fsToggle = document.getElementById('fs-toggle');

    // 監視・再生制御
    let checkInterval = null;
    let lastTime = -1;
    let freezeDuration = 0;
    let currentPlayingUrl = "";
    let currentPlayingName = "";
    let controlTimeout = null;
    let reloadAttempts = 0;
    let lastSyncedTimestamp = 0;

    // タッチスライド（スワイプ）閉じる用の変数
    let touchStartX = 0;
    let touchStartY = 0;
    let touchEndX = 0;
    let touchEndY = 0;

    // トースト
    function showToast(message, isError = false) {
      toastMessage.textContent = message;
      if (isError) {
        toastIcon.textContent = 'error';
        toastIcon.className = 'material-symbols-outlined text-red-500 text-lg';
      } else {
        toastIcon.textContent = 'sync';
        toastIcon.className = 'material-symbols-outlined text-brand animate-spin text-lg';
      }
      toast.classList.remove('opacity-0', 'pointer-events-none');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 4000);
    }

    // M3Uパース
    function parseM3U(text) {
      const lines = text.split('\n');
      const channels = [];
      let currentInfo = null;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        if (line.startsWith('#EXTINF:')) {
          currentInfo = parseExtInf(line);
        } else if (line.startsWith('http://') || line.startsWith('https://')) {
          if (currentInfo) {
            currentInfo.url = line;
            channels.push(currentInfo);
            currentInfo = null;
          }
        }
      }
      return channels;
    }

    function parseExtInf(line) {
      const tvgIdMatch = line.match(/tvg-id="([^"]+)"/i);
      const tvgNameMatch = line.match(/tvg-name="([^"]+)"/i);
      const groupMatch = line.match(/group-title="([^"]+)"/i);
      const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
      
      const commaIndex = line.lastIndexOf(',');
      const displayName = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : "";

      let rawGroup = groupMatch ? groupMatch[1].toLowerCase() : "etc";
      let matchedGroup = "etc";
      if (rawGroup.includes("tokyo")) matchedGroup = "tokyo";
      else if (rawGroup.includes("osaka")) matchedGroup = "osaka";

      const name = tvgNameMatch ? tvgNameMatch[1] : displayName;
      const keywords = [name.toLowerCase(), displayName.toLowerCase()];
      if (tvgIdMatch) keywords.push(tvgIdMatch[1].toLowerCase());

      return {
        id: tvgIdMatch ? tvgIdMatch[1] : Math.random().toString(36).substr(2, 9),
        name: name,
        logo: logoMatch ? logoMatch[1] : "",
        group: matchedGroup,
        keywords: keywords,
        currentUrl: "",
        favorite: false
      };
    }

    // 初期化
    function initializeData() {
      const parsedDefault = parseM3U(rawM3U);
      parsedDefault.forEach(ch => {
        ch.currentUrl = ch.url;
      });
      presetChannels = parsedDefault.filter(ch => ch.group === 'tokyo' || ch.group === 'osaka');

      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const savedData = JSON.parse(saved);
        savedData.forEach(item => {
          const ch = presetChannels.find(p => p.id === item.id || p.name === item.name);
          if (ch) {
            if (item.currentUrl) ch.currentUrl = item.currentUrl;
            ch.favorite = !!item.favorite;
          }
        });
      }
      renderLibrary();
      
      // 初回ロード時もクラウドからデータを取得して最新状態にする
      silentSyncFromCloud().then(() => {
        saveState();
      });
    }

    function saveState() {
      const data = presetChannels.map(ch => ({
        id: ch.id,
        name: ch.name,
        currentUrl: ch.currentUrl,
        favorite: ch.favorite
      }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      saveToCloud(); // アップロード時に裏でクラウド保存
    }

    // レンダリング
    function renderLibrary() {
      tokyoGrid.innerHTML = '';
      osakaGrid.innerHTML = '';
      favoriteGrid.innerHTML = '';

      let favoriteChannels = presetChannels.filter(ch => ch.favorite);
      let tokyoChannels = presetChannels.filter(ch => ch.group === 'tokyo');
      let osakaChannels = presetChannels.filter(ch => ch.group === 'osaka');

      if (favoriteChannels.length > 0) {
        favoriteSection.classList.remove('hidden');
        favoriteChannels.forEach(ch => renderCard(ch, favoriteGrid));
      } else {
        favoriteSection.classList.add('hidden');
      }

      tokyoChannels.sort((a,b) => a.name.localeCompare(b.name, 'ja')).forEach(ch => renderCard(ch, tokyoGrid));
      osakaChannels.sort((a,b) => a.name.localeCompare(b.name, 'ja')).forEach(ch => renderCard(ch, osakaGrid));
    }

    function renderCard(ch, parentGrid) {
      const hasUrl = !!ch.currentUrl;
      const starClass = ch.favorite ? 'filled-icon' : 'text-gray-400 hover:text-brand';
      
      const logoHTML = ch.logo 
        ? `<img src="${ch.logo}" alt="${ch.name}" class="w-12 h-12 object-contain bg-gray-50 rounded-2xl p-1 border border-gray-100" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
        : '';
      const fallbackLogoHTML = `<div class="w-12 h-12 flex items-center justify-center bg-brand-light rounded-2xl text-brand" style="${ch.logo ? 'display:none;' : ''}">
                                  <span class="material-symbols-outlined text-2xl font-light">live_tv</span>
                                </div>`;

      const card = document.createElement('div');
      card.className = `relative group bg-white rounded-3xl p-5 border border-gray-200/60 shadow-sm hover:shadow-md transition-all duration-300 ${hasUrl ? 'cursor-pointer hover:border-brand' : 'opacity-60 cursor-not-allowed'}`;
      
      card.innerHTML = `
        <button class="absolute top-4 right-4 z-10 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors" onclick="toggleFavorite('${ch.id}', event)">
          <span class="material-symbols-outlined text-xl ${starClass}">star</span>
        </button>

        <div class="flex items-center space-x-4 pr-8">
          ${logoHTML}
          ${fallbackLogoHTML}
          <div class="overflow-hidden">
            <h4 class="font-medium text-gray-800 text-sm truncate">${ch.name}</h4>
            <p class="text-xs text-gray-400 mt-0.5">${hasUrl ? 'タップして再生' : 'オフライン'}</p>
          </div>
        </div>

        ${hasUrl ? `
        <div class="absolute inset-0 bg-brand/5 group-hover:bg-brand/10 rounded-3xl transition-all duration-300 flex items-center justify-center opacity-0 group-hover:opacity-100">
          <div class="bg-brand text-white w-11 h-11 rounded-full flex items-center justify-center shadow-lg transform scale-90 group-hover:scale-100 transition-transform duration-300">
            <span class="material-symbols-outlined text-2xl text-white filled-icon" style="color:white !important;">play_arrow</span>
          </div>
        </div>
        ` : ''}
      `;

      if (hasUrl) {
        card.addEventListener('click', () => {
          switchToPlayerView(ch.name);
          playStream(ch.currentUrl, ch.name);
        });
      }

      parentGrid.appendChild(card);
    }

    window.toggleFavorite = function(id, event) {
      event.stopPropagation();
      const channel = presetChannels.find(ch => ch.id === id);
      if (channel) {
        channel.favorite = !channel.favorite;
        saveState();
        renderLibrary();
      }
    }

    // ==============================================
    // ★ クラウド自動同期 (CORS完全対応パブリックストア)
    // ==============================================
    async function saveToCloud() {
      const timestamp = Date.now();
      lastSyncedTimestamp = timestamp;

      const payload = {
        timestamp: timestamp,
        channels: presetChannels.map(ch => ({
          id: ch.id,
          name: ch.name,
          currentUrl: ch.currentUrl,
          favorite: ch.favorite
        }))
      };
      
      try {
        await fetch(`https://kvs.ix.workers.dev/${cloudRoom}/iptv_sync_data`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.warn("自動クラウド保存に失敗:", err);
      }
    }

    async function silentSyncFromCloud() {
      try {
        const response = await fetch(`https://kvs.ix.workers.dev/${cloudRoom}/iptv_sync_data`);
        if (response.ok) {
          const cloudData = await response.json();
          
          if (cloudData.timestamp && cloudData.timestamp > lastSyncedTimestamp) {
            lastSyncedTimestamp = cloudData.timestamp;
            
            cloudData.channels.forEach(item => {
              const ch = presetChannels.find(p => p.id === item.id || p.name === item.name);
              if (ch) {
                if (item.currentUrl) ch.currentUrl = item.currentUrl;
                ch.favorite = !!item.favorite;
              }
            });

            const dataToSave = presetChannels.map(ch => ({
              id: ch.id,
              name: ch.name,
              currentUrl: ch.currentUrl,
              favorite: ch.favorite
            }));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));

            renderLibrary();
            showToast("全端末自動同期：最新のURLアドレスに更新されました。");
          }
        }
      } catch (err) {
        console.warn("自動同期エラー:", err);
      }
    }

    // 15秒ごとにバックグラウンドでクラウドデータを全自動取得してマージ
    setInterval(() => {
      if (!mainView.classList.contains('hidden')) {
        silentSyncFromCloud();
      }
    }, 15000);

    // ==============================================
    // 画面切り替えとスライドアニメーション ＆ フィット制御
    // ==============================================
    function switchToPlayerView(channelName) {
      window.scrollTo(0, 0); // 遷移前にスクロールリセット
      playingChannelName.textContent = channelName;
      viewSlider.style.transform = 'translateX(-50%)';
      
      // プレイヤー表示時はスクロール禁止
      document.body.classList.add('overflow-hidden', 'h-screen');
    }

    function switchToMainView() {
      stopStream();
      
      toast.classList.remove('opacity-100');
      toast.classList.add('opacity-0', 'pointer-events-none');

      viewSlider.style.transform = 'translateX(0)';

      // 通常画面に戻ったらスクロールを許可
      document.body.classList.remove('overflow-hidden', 'h-screen');
    }

    backBtn.addEventListener('click', switchToMainView);

    // ==============================================
    // ★ 左から右へのスライド（スワイプ）閉じるジェスチャーの実装
    // ==============================================
    playerView.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchEndX = 0;
      touchEndY = 0;
    }, { passive: true });

    playerView.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) return; // マルチタッチ時は除外
      touchEndX = e.touches[0].clientX;
      touchEndY = e.touches[0].clientY;
    }, { passive: true });

    playerView.addEventListener('touchend', (e) => {
      if (touchStartX > 0 && touchEndX > 0) {
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        // 左から右への十分なスライド量（100px以上）があり、かつ上下方向のブレが少ない場合
        if (diffX > 100 && Math.abs(diffY) < 80) {
          switchToMainView();
        }
      }
      touchStartX = 0;
      touchEndX = 0;
    });

    // ==============================================
    // ★ CORSプロキシを全自動で挟み込むカスタムローダーの定義 [1]
    // ==============================================
    class CustomCorsProxyLoader extends Hls.DefaultConfig.loader {
      constructor(config) {
        super(config);
        const originalLoad = this.load.bind(this);
        
        this.load = function (context, config, callbacks) {
          // すでにプロキシが付与されている場合以外、URLの直前にCORSプロキシURLを自動結合する
          if (context.url && !context.url.startsWith("https://corsproxy.io")) {
            context.url = CORS_PROXY + context.url;
          }
          originalLoad(context, config, callbacks);
        };
      }
    }

    // ==============================================
    // HLS再生 ＆ エラー・5秒フリーズ検知
    // ==============================================
    function playStream(url, name) {
      currentPlayingUrl = url;
      currentPlayingName = name;

      playerError.classList.add('hidden');
      playerLoader.classList.remove('opacity-0', 'pointer-events-none');
      loaderText.textContent = "ストリームをロード中...";

      resetControls();

      if (Hls.isSupported()) {
        if (window.hlsInstance) {
          window.hlsInstance.destroy();
        }

        // Hls.js初期化時に、プレイリストとセグメントの全ローダーにプロキシローダーをバインド
        const hls = new Hls({
          manifestLoadingMaxRetry: 1,
          levelLoadingMaxRetry: 1,
          enableWorker: true,
          pLoader: CustomCorsProxyLoader, // プレイリスト(m3u8)用
          fLoader: CustomCorsProxyLoader  // セグメント(.ts)用
        });
        window.hlsInstance = hls;
        hls.loadSource(url);
        hls.attachMedia(videoPlayer);

        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          videoPlayer.play().catch(err => {
            console.warn("自動再生ブロック");
          });
        });

        hls.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal) {
            console.error("HLS重大エラー:", data.type);
            triggerAutoReload();
          }
        });

      } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
        // iOS Safari等のネイティブHLS再生用 (プロキシは手前に直接くっつける)
        videoPlayer.src = CORS_PROXY + url;
        videoPlayer.addEventListener('loadedmetadata', function() {
          videoPlayer.play();
        });
      } else {
        showPlayerError();
        return;
      }

      startFreezeCheck();
    }

    function stopStream() {
      stopFreezeCheck();
      videoPlayer.pause();
      videoPlayer.src = "";
      if (window.hlsInstance) {
        window.hlsInstance.destroy();
        window.hlsInstance = null;
      }
      playerLoader.classList.add('opacity-0', 'pointer-events-none');
      playerError.classList.add('hidden');
      reloadAttempts = 0;
    }

    function startFreezeCheck() {
      stopFreezeCheck();
      lastTime = -1;
      freezeDuration = 0;

      checkInterval = setInterval(() => {
        if (videoPlayer.paused) {
          freezeDuration = 0;
          return;
        }

        const currentTime = videoPlayer.currentTime;
        if (currentTime === lastTime) {
          freezeDuration++;
          
          if (freezeDuration >= 5) {
            console.error("5秒フリーズ検知");
            triggerAutoReload();
          }
        } else {
          freezeDuration = 0;
          lastTime = currentTime;
        }
      }, 1000);
    }

    function stopFreezeCheck() {
      if (checkInterval) {
        clearInterval(checkInterval);
        checkInterval = null;
      }
    }

    function triggerAutoReload() {
      stopFreezeCheck();
      reloadAttempts++;

      if (reloadAttempts >= 3) {
        showPlayerError();
        return;
      }

      showToast("ストリームが固まったため、自動接続しています...");
      loaderText.textContent = "再接続中...";
      playerLoader.classList.remove('opacity-0', 'pointer-events-none');

      setTimeout(() => {
        playStream(currentPlayingUrl, currentPlayingName);
      }, 1500);
    }

    // 再生エラー検知
    function showPlayerError() {
      stopFreezeCheck();
      playerLoader.classList.add('opacity-0', 'pointer-events-none');
      playerError.classList.remove('hidden');
      videoPlayer.pause();
    }

    videoPlayer.addEventListener('error', (e) => {
      console.error("Video Error Event", e);
      showPlayerError();
    });

    // ==============================================
    // カスタムコントロール
    // ==============================================
    function showControls() {
      customControls.classList.remove('opacity-0', 'pointer-events-none');
      clearTimeout(controlTimeout);
      controlTimeout = setTimeout(() => {
        customControls.classList.add('opacity-0', 'pointer-events-none');
      }, 3500);
    }

    function resetControls() {
      playIcon.textContent = "pause";
      seekBar.style.display = 'none';
      liveBadge.style.display = 'flex';
    }

    videoWrapper.addEventListener('mousemove', showControls);
    videoWrapper.addEventListener('click', (e) => {
      if (e.target.closest('#custom-controls')) return;
      if (videoPlayer.paused) {
        videoPlayer.play();
      } else {
        videoPlayer.pause();
      }
      showControls();
    });

    videoPlayer.addEventListener('waiting', () => {
      loaderText.textContent = "読込中...";
      playerLoader.classList.remove('opacity-0', 'pointer-events-none');
    });

    videoPlayer.addEventListener('playing', () => {
      playerLoader.classList.add('opacity-0', 'pointer-events-none');
      freezeDuration = 0;
    });

    videoPlayer.addEventListener('play', () => {
      playIcon.textContent = "pause";
    });

    videoPlayer.addEventListener('pause', () => {
      playIcon.textContent = "play_arrow";
      showControls();
    });

    playPauseBtn.addEventListener('click', () => {
      if (videoPlayer.paused) {
        videoPlayer.play();
      } else {
        videoPlayer.pause();
      }
    });

    muteBtn.addEventListener('click', () => {
      videoPlayer.muted = !videoPlayer.muted;
      volumeIcon.textContent = videoPlayer.muted ? "volume_off" : "volume_up";
    });

    videoPlayer.addEventListener('durationchange', () => {
      if (videoPlayer.duration === Infinity) {
        seekBar.style.display = 'none';
        liveBadge.style.display = 'flex';
      } else {
        seekBar.style.display = 'block';
        liveBadge.style.display = 'none';
        seekBar.max = videoPlayer.duration;
      }
    });

    videoPlayer.addEventListener('timeupdate', () => {
      if (videoPlayer.duration !== Infinity) {
        seekBar.value = videoPlayer.currentTime;
      }
    });

    seekBar.addEventListener('input', () => {
      videoPlayer.currentTime = seekBar.value;
    });

    fsToggle.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        videoWrapper.requestFullscreen().catch(err => {
          console.error(err);
        });
      } else {
        document.exitFullscreen();
      }
    });

    // ==============================================
    // アップロード
    // ==============================================
    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const text = e.target.result;
        const parsed = parseM3U(text);
        
        let updatedCount = 0;
        parsed.forEach(uploaded => {
          const ch = presetChannels.find(p => p.id === uploaded.id || p.keywords.some(k => uploaded.keywords.includes(k)));
          if (ch) {
            ch.currentUrl = uploaded.url;
            updatedCount++;
          }
        });

        saveState();
        renderLibrary();
        showToast(`${updatedCount}個のチャンネルURLを最新に更新・同期しました。`);
      };
      reader.readAsText(file);
    }

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('bg-brand-light/50', 'border-brand');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('bg-brand-light/50', 'border-brand');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('bg-brand-light/50', 'border-brand');
      handleFile(e.dataTransfer.files[0]);
    });

    // 起動
    initializeData();
  </script>
</body>
</html>
