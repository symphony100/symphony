<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/x-icon" href="https://symphony100.github.io/symphony/symphony.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>symphony</title>
  <style>
    ul {
      display: flex;
      text-align: center;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* ヘッダー全体のスタイル */
    body {
      margin: 20px; 
      padding: 50px 10px 50px 10px; 
    }
    .Header {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 40px; 
      padding: 10px; 
      background-color: #008DBD;
      color: #FFFFFF; 
      z-index: 1000;
    }
    .Contents {
      width: 100%; 
      overflow: auto; 
    }

    /* 左側のロゴやタイトル */
    .logo {
      font-size: 1.5em;
      font-weight: auto;
    }

    /* リンクボタンのコンテナ */
    .nav-buttons {
      display: flex;
      gap: 15px;
    }

    /* ボタンのスタイル */
    .nav-buttons a {
      text-decoration: none;
      color: white;
      background-color: #9ACD32;
      padding: 8px 16px;
      border-radius: 10px;
      transition: background-color 0.3s ease;
    }

    .nav-buttons a:hover {
      background-color: #008000;
    }
	
    /* アイコン一覧（グリッド） */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4列に設定 */
      gap: 15px;
      padding: 20px;
    }

    /* アイコンのリンクとCSSアイコンのスタイル */
    .icon-link {
      text-decoration: none;
      color: black;
    }

    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 80px;
      background-color: #e0e0e0;
      border-radius: 8px;
      transition: background-color 0.3s, transform 0.3s;
    }

    /* ラベルのスタイル */
    .icon span {
      margin-top: 5px;
      font-size: 11px;
      text-align: center;
      font-weight: bold;
    }

    .icon:hover {
      background-color: #c0c0c0;
      transform: scale(1.1);
    }

    /* ===== ピュアCSSアイコンの定義 ===== */
    .css-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-sizing: border-box;
    }

    /* 1. ゲーム */
    .css-icon-game {
      width: 32px;
      height: 18px;
      background: #555;
      border-radius: 9px;
    }
    .css-icon-game::before {
      content: '';
      position: absolute;
      left: 18px;
      top: 16px;
      width: 8px;
      height: 8px;
      background: #aaa;
      clip-path: polygon(30% 0%, 70% 0%, 70% 30%, 100% 30%, 100% 70%, 70% 70%, 70% 100%, 30% 100%, 30% 70%, 0% 70%, 0% 30%, 30% 30%);
    }
    .css-icon-game::after {
      content: '';
      position: absolute;
      right: 18px;
      top: 16px;
      width: 5px;
      height: 5px;
      background: #e74c3c;
      border-radius: 50%;
      box-shadow: -6px 3px 0 #3498db;
    }

    /* 2. 電卓 */
    .css-icon-calc {
      width: 22px;
      height: 30px;
      border: 2px solid #333;
      border-radius: 3px;
      background: #fff;
    }
    .css-icon-calc::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 12px;
      width: 16px;
      height: 6px;
      background: #a9dfbf;
      border: 1px solid #333;
    }
    .css-icon-calc::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 12px;
      width: 16px;
      height: 12px;
      background: repeating-linear-gradient(to right, #333 0, #333 2px, transparent 2px, transparent 5px),
                  repeating-linear-gradient(to bottom, #333 0, #333 2px, transparent 2px, transparent 4px);
    }

    /* 3. メモ帳 */
    .css-icon-memo {
      width: 22px;
      height: 28px;
      border: 2px solid #333;
      background: #fff;
      border-radius: 2px;
    }
    .css-icon-memo::before {
      content: '';
      position: absolute;
      top: 11px;
      left: 12px;
      width: 16px;
      height: 14px;
      background: repeating-linear-gradient(transparent 0, transparent 3px, #5d6d7e 3px, #5d6d7e 5px);
    }

    /* 4. ログイン */
    .css-icon-login {
      width: 30px;
      height: 30px;
    }
    .css-icon-login::before {
      content: '';
      position: absolute;
      right: 6px;
      top: 6px;
      width: 12px;
      height: 24px;
      border: 2px solid #333;
      border-left: none;
    }
    .css-icon-login::after {
      content: '→';
      position: absolute;
      left: 4px;
      top: 6px;
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    /* 5. クイズ */
    .css-icon-quiz {
      width: 26px;
      height: 26px;
      background: #3498db;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 5px;
    }

    /* 6. 今日の占い */
    .css-icon-fortune {
      width: 30px;
      height: 30px;
    }
    .css-icon-fortune::before, .css-icon-fortune::after {
      content: '';
      position: absolute;
      background: #f1c40f;
      width: 24px;
      height: 24px;
      clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
    }
    .css-icon-fortune::before {
      left: 3px;
      top: 3px;
    }
    .css-icon-fortune::after {
      left: 12px;
      top: 0px;
      transform: scale(0.5);
      opacity: 0.7;
    }

    /* 7. コマンド */
    .css-icon-cmd {
      width: 32px;
      height: 22px;
      background: #222;
      border-radius: 3px;
      border: 1px solid #777;
    }
    .css-icon-cmd::before {
      content: '>';
      position: absolute;
      left: 8px;
      top: 10px;
      color: #2ecc71;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
    }
    .css-icon-cmd::after {
      content: '_';
      position: absolute;
      left: 15px;
      top: 10px;
      color: #2ecc71;
      font-family: monospace;
      font-size: 12px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* 8. ロゴマーク */
    .css-icon-logo {
      width: 26px;
      height: 26px;
      border: 2px solid #e74c3c;
      border-radius: 50%;
      background: #3498db;
    }
    .css-icon-logo::before {
      content: '';
      position: absolute;
      top: 11px;
      left: 11px;
      width: 14px;
      height: 14px;
      background: #f1c40f;
      transform: rotate(45deg);
    }

    /* 9. ヘルプ */
    .css-icon-help {
      width: 26px;
      height: 26px;
      border: 2px solid #7f8c8d;
      border-radius: 50%;
      font-size: 16px;
      font-weight: bold;
      color: #7f8c8d;
    }

    /* 10. 詐欺体験 */
    .css-icon-scam {
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 26px solid #f1c40f;
    }
    .css-icon-scam::before {
      content: '!';
      position: absolute;
      top: 10px;
      left: 18px;
      font-size: 13px;
      font-weight: bold;
      color: black;
    }

    /* 11. 自己紹介 */
    .css-icon-profile {
      width: 30px;
      height: 30px;
    }
    .css-icon-profile::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 15px;
      width: 10px;
      height: 10px;
      background: #34495e;
      border-radius: 50%;
    }
    .css-icon-profile::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 10px;
      width: 20px;
      height: 8px;
      background: #34495e;
      border-radius: 8px 8px 0 0;
    }

    /* 12. ランキング */
    .css-icon-ranking {
      width: 26px;
      height: 20px;
      background: #f1c40f;
      clip-path: polygon(0% 0%, 25% 60%, 50% 0%, 75% 60%, 100% 0%, 80% 100%, 20% 100%);
    }

    /* 13. サポート */
    .css-icon-support {
      width: 28px;
      height: 18px;
      border: 2px solid #e67e22;
      background: #fff;
      border-radius: 2px;
    }
    .css-icon-support::before {
      content: '';
      position: absolute;
      top: 11px;
      left: 6px;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 8px solid #e67e22;
    }
    /* ================================== */

    /* ボタンの装飾 */
    .btn,
    a.btn,
    button.btn {
      text-decoration: none;
      color: #212529;
      cursor: pointer;
    }

    a.btn-border {
      border: 2px solid #000;
      border-radius: 0;
      background: #fff;
      display: inline-block;
      padding: 5px 10px;
      margin: 2px;
    }

    a.btn-border:hover {
      color: #fff;
      background: #000;
    }

    a.btn-flat {
      overflow: hidden;
      padding: 1.5rem 6rem;
      color: #fff;
      border-radius: 0;
      background: #000;
    }

    a.btn-flat span {
      position: relative;
    }

    a.btn-flat:before {
      position: absolute;
      top: 0;
      left: 30px;
      width: 150%;
      height: 500%;
      content: '';
      transition: all .5s ease-in-out;
      transform: translateX(-98%) translateY(-70%) rotate(135deg);
      background: #fff100;
    }

    a.btn-flat:hover:before {
      transform: translateX(-9%) translateY(-25%) rotate(135deg);
    }

    /* スクロールエフェクト */
    html {
      scroll-behavior: smooth;
    }
    #topButton {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      background-color: #333;
      color: #fff;
      text-decoration: none;
    }

    #topButton:hover {
      background-color: #555;
    }

    /* フッター */
    footer {
      background-color: #abbaba;
      color: #000000;
      text-align: center;
      padding: 20px;
      width: 100%;
      box-sizing: border-box;
    }

    footer p {
      margin: 5px 0;
    }

    footer a {
      color: #050505;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* スマートフォン対応 */
    @media (max-width: 600px) {
      footer {
        padding: 15px;
        font-size: 14px;
      }
      footer a {
        margin: 0 5px;
      }
    }

    /* タブレット対応 */
    @media (min-width: 601px) and (max-width: 1024px) {
      footer {
        padding: 20px;
        font-size: 16px;
      }
      footer a {
        margin: 0 8px;
      }
    }
	
    /* フェードインするテキストのスタイル */
    .fade-in-text {
      font-size: 2em;
      opacity: 0;
      animation: fadeIn 4s ease-in-out forwards;
    }

    /* フェードインアニメーション */
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* 時間割表示エリアの装飾 */
    .timetable-box {
      border: 2px solid #000;
      padding: 20px;
      background-color: #fcfcfc;
      margin: 15px 0;
      max-width: 500px;
      border-radius: 4px;
    }
  </style>
</head>

  <span id="view_clock"></span>

  <script type="text/javascript">
    timerID = setInterval('clock()',500); 

    function clock() {
      document.getElementById("view_clock").innerHTML = getNow();
    }

    function getNow() {
      var now = new Date();
      var year = now.getFullYear();
      var mon = now.getMonth()+1; 
      var day = now.getDate();
      var hour = now.getHours();
      var min = now.getMinutes();
      var sec = now.getSeconds();

      var s = year + "年" + mon + "月" + day + "日" + hour + "時" + min + "分" + sec + "秒"; 
      return s;
    }
  </script>

  <!-- 曜日ごとの時間割切り替えを行うJavaScript処理 -->
  <script type="text/javascript">
    var classSchedule = [
      { start: 6,  end: 9,  periodName: "１時間目", index: 0 },
      { start: 9,  end: 10, periodName: "２時間目", index: 1 },
      { start: 10, end: 11, periodName: "３時間目", index: 2 },
      { start: 11, end: 12, periodName: "４時間目", index: 3 },
      { start: 13, end: 14, periodName: "５時間目", index: 4 }, 
      { start: 14, end: 15, periodName: "６時間目", index: 5 }
    ];

    var subjectsData = {
      1: { dayName: "月曜日", list: ["国語", "数学", "英語", "理科", "社会", "音楽"] },
      2: { dayName: "火曜日", list: ["数学", "理科", "社会", "国語", "体育", "英語"] },
      3: { dayName: "水曜日", list: ["英語", "国語", "数学", "理科", "図工", "音楽"] },
      4: { dayName: "木曜日", list: ["理科", "社会", "体育", "数学", "英語", "国語"] },
      5: { dayName: "金曜日", list: ["社会", "英語", "国語", "理科", "家庭科", "総合"] },
      6: { dayName: "土曜日", list: ["理科", "国語", "体育", "社会", "（なし）", "（なし）"] },
      0: { dayName: "日曜日", list: ["（なし）", "（なし）", "（なし）", "（なし）", "（なし）", "（なし）"] }
    };

    function displayTimetable(dayIndex) {
      var data = subjectsData[dayIndex];
      if (!data) return;

      document.getElementById("timetable-title").innerText = data.dayName + "の授業";

      var now = new Date();
      var currentHour = now.getHours();
      var currentClassText = "只今のお時間は、授業はありません。";

      for (var i = 0; i < classSchedule.length; i++) {
        var sched = classSchedule[i];
        if (currentHour >= sched.start && currentHour < sched.end) {
          var subject = data.list[sched.index];
          if (subject && subject !== "（なし）" && subject !== "") {
            currentClassText = sched.periodName + "の授業は、" + subject + "です。";
          }
          break;
        }
      }
      document.getElementById("timetable-status").innerText = currentClassText;

      var listHtml = "";
      for (var j = 0; j < 6; j++) {
        var subName = data.list[j] || "（なし）";
        listHtml += (j + 1) + "時間目　" + subName + "<br>";
      }
      document.getElementById("timetable-list").innerHTML = listHtml;

      document.getElementById("timetable-area").style.display = "block";
    }
  </script>
