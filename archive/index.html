<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/x-icon" href="https://symphony100.github.io/symphony/symphony.png">
  <title>Symphony | アーカイブセンター</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <style>
    :root {
      --primary: #008DBD;
      --on-primary: #ffffff;
      --surface: #ffffff; /* 純白 */
      --on-surface: #1a1c1e;
      --outline: #eeeeee;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { box-sizing: border-box; font-family: Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; background: var(--surface); color: var(--on-surface); 
      min-height: 100vh; overflow-x: hidden; 
    }

    /* ページ読み込みフェード */
    @keyframes fadeInPage {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    main { animation: fadeInPage 0.8s var(--spring) forwards; opacity: 0; }

    /* --- ヘッダー (2pxの境界線を厳守) --- */
    header {
      height: 64px; display: flex; align-items: center; padding: 0 24px;
      background: #ffffff; 
      border-bottom: 2px solid var(--primary); /* 太い境界線 */
      position: sticky; top: 0; z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 12px; color: var(--primary); font-weight: 900; font-size: 20px; text-decoration: none; }
    .brand img { width: 26px; height: 26px; }

    /* --- メイン領域 --- */
    main { max-width: 850px; margin: 0 auto; padding: 60px 24px 100px; }

    .hero { margin-bottom: 64px; }
    h1 { font-size: 64px; font-weight: 900; margin: 0; letter-spacing: -4px; color: var(--on-surface); }
    .description { font-size: 18px; color: #5f6368; font-weight: 700; margin-top: 16px; line-height: 1.6; }

    /* --- 四角い見出しボックス (Arial 900) --- */
    .section-header { margin: 64px 0 32px 0; display: flex; }
    .section-title-box { 
      background: var(--primary); color: var(--on-primary);
      padding: 10px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 900; letter-spacing: 2px;
    }

    /* --- アーカイブグリッド --- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
    
    .card {
      aspect-ratio: 1/1; 
      background: #ffffff; 
      border-radius: 36px; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-decoration: none; color: inherit; 
      border: 3px solid var(--outline); /* 3pxのしっかりした枠線 */
      transition: border-color 0.3s var(--spring), box-shadow 0.3s var(--spring);
      text-align: center;
      padding: 20px;
    }

    /* ホバー：枠線のみ光る (浮かない・白くならない) */
    .card:hover { 
      border-color: var(--primary); 
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    /* 56px 特大アイコン */
    .card .material-symbols-rounded { 
      font-size: 56px; 
      color: var(--primary); 
      margin-bottom: 16px; 
      font-variation-settings: 'FILL' 1; 
      transition: transform 0.3s var(--spring);
    }
    .card:hover .material-symbols-rounded { transform: scale(1.1); }

    .card span { font-size: 17px; font-weight: 900; color: var(--on-surface); }
    .card .sub-label { font-size: 13px; color: #888; margin-top: 4px; font-weight: 700; }

    /* --- フッター (重厚感) --- */
    footer { 
      background: #111111; color: white; padding: 80px 24px; text-align: center; border-top: 8px solid var(--primary); 
    }
    .f-logo { font-size: 24px; font-weight: 900; margin-bottom: 16px; color: var(--primary); letter-spacing: 1px; }
    .f-copy { font-size: 12px; color: #555; font-weight: 900; }

    @media (max-width: 500px) {
      h1 { font-size: 44px; letter-spacing: -2px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .card { border-radius: 28px; }
    }
  </style>
</head>
<body id="app-body">

<header>
  <a href="../" class="brand">
    <img src="https://symphony100.github.io/symphony/symphony.png" alt="ロゴ">
    <span>Symphony アーカイブ</span>
  </a>
</header>

<main>
  <div class="hero">
    <h1>過去の記録</h1>
    <p class="description">
      Symphony System Group の歴史的資産。<br>
      デザインの変遷と開発の歩みをここに保存しています。
    </p>
  </div>

  <div class="section-header">
    <div class="section-title-box">保存済みバージョン</div>
  </div>

  <div class="grid">
    <!-- 2025/12/04 -->
    <a href="20251204/" class="card">
      <span class="material-symbols-rounded">history</span>
      <span>2024/11/25</span>
      <div class="sub-label">V4.0</div>
    </a>
    
    <!-- 2024/11/25 -->
    <a href="20241125/" class="card">
      <span class="material-symbols-rounded">history</span>
      <span>2024/11/25</span>
      <div class="sub-label">V2.8</div>
    </a>

    <!-- 2024/09/14 -->
    <a href="20240914/" class="card">
      <span class="material-symbols-rounded">history</span>
      <span>2024/09/14</span>
      <div class="sub-label">V1.6</div>
    </a>

    <!-- 2024/09/02 -->
    <a href="20240902/" class="card">
      <span class="material-symbols-rounded">stars</span>
      <span>2024/09/02</span>
      <div class="sub-label">V1.0</div>
    </a>
  </div>
</main>

<footer>
  <div class="f-logo">SYMPHONY SYSTEM GROUP</div>
  <div class="f-copy">© 2024-2026 Symphony System Group. All Rights Reserved.</div>
</footer>

<script>
  // --- テーマカラー同期システム ---
  function syncTheme() {
    const savedColor = localStorage.getItem('symphony-color') || '#008DBD';
    document.documentElement.style.setProperty('--primary', savedColor);
  }

  window.onload = () => {
    syncTheme();
    document.querySelector('main').style.opacity = '1';
  };

  // リアルタイム反映
  window.addEventListener('storage', (e) => {
    if (e.key === 'symphony-color') syncTheme();
  });
</script>

</body>
</html>
